<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" style="background:#050508">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0d080"/>
      <stop offset="0.5" stop-color="#f0a030"/>
      <stop offset="1" stop-color="#d08020"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="20"/></filter>
  </defs>

  <rect width="1200" height="600" fill="#050508"/>

  <!-- Subtle radial glow -->
  <ellipse cx="600" cy="260" rx="330" ry="120" fill="#f0a030" opacity="0.04" filter="url(#blur)"/>

  <!-- QUINTE title -->
  <text x="600" y="280" text-anchor="middle" fill="url(#g)"
        font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="170" font-weight="900" letter-spacing="19">QUINTE</text>

  <!-- Subtitle -->
  <text x="600" y="340" text-anchor="middle" fill="#707088"
        font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="18" letter-spacing="8">FIVE-PARTY RESIDUAL EXPOSURE PROTOCOL</text>

  <!-- Protocol signal -->
  <text x="600" y="420" text-anchor="middle" fill="#505068"
        font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="14" letter-spacing="3">INDEPENDENT · ADVERSARIAL · AUDITABLE</text>
</svg>
