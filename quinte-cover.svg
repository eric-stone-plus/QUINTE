<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" style="background:#0a0a0f">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#f0c060" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0a0a0f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0c060"/>
      <stop offset="50%" stop-color="#f0a040"/>
      <stop offset="100%" stop-color="#e0c080"/>
    </linearGradient>
    <filter id="titleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="badgeH">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#60c0f0" flood-opacity="0.3"/>
    </filter>
    <filter id="badgeC">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#f0a060" flood-opacity="0.3"/>
    </filter>
    <filter id="badgeW">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#60f0a0" flood-opacity="0.3"/>
    </filter>
    <filter id="badgeR">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#c060f0" flood-opacity="0.3"/>
    </filter>
    <filter id="badgeO">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#f06090" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0f"/>
  <rect width="1200" height="630" fill="url(#bgGlow)"/>

  <!-- Particles -->
  <g opacity="0.6">
    <circle cx="120" cy="80" r="1.5" fill="#f0c060"><animate attributeName="opacity" values="0;0.6;0" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="340" cy="150" r="1" fill="#f0c060"><animate attributeName="opacity" values="0;0.5;0" dur="5s" begin="1s" repeatCount="indefinite"/></circle>
    <circle cx="680" cy="60" r="1.5" fill="#f0c060"><animate attributeName="opacity" values="0;0.4;0" dur="3.5s" begin="0.5s" repeatCount="indefinite"/></circle>
    <circle cx="900" cy="180" r="1" fill="#f0c060"><animate attributeName="opacity" values="0;0.6;0" dur="6s" begin="2s" repeatCount="indefinite"/></circle>
    <circle cx="1050" cy="100" r="1.5" fill="#f0c060"><animate attributeName="opacity" values="0;0.5;0" dur="4.5s" begin="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="180" cy="400" r="1" fill="#f0c060"><animate attributeName="opacity" values="0;0.4;0" dur="5.5s" begin="3s" repeatCount="indefinite"/></circle>
    <circle cx="750" cy="500" r="1.5" fill="#f0c060"><animate attributeName="opacity" values="0;0.3;0" dur="4s" begin="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="350" r="1" fill="#f0c060"><animate attributeName="opacity" values="0;0.5;0" dur="7s" begin="0s" repeatCount="indefinite"/></circle>
  </g>

  <!-- QUINTE — Hero Title -->
  <text x="600" y="210" text-anchor="middle" fill="url(#gold)" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="150" font-weight="900" letter-spacing="14">QUINTE</text>

  <!-- Subtitle -->
  <text x="600" y="290" text-anchor="middle" fill="#606080" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="22" letter-spacing="10">MULTI-AGENT DEBATE ARCHITECTURE</text>

  <!-- Divider -->
  <line x1="300" y1="320" x2="900" y2="320" stroke="#f0c060" stroke-width="0.5" opacity="0.15"/>

  <!-- Description -->
  <text x="600" y="360" text-anchor="middle" fill="#505068" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="14" letter-spacing="1">Five independent AI agents · Structured rounds · Adversarial cross-review · Final verdict</text>

  <!-- Agent Badges -->
  <g transform="translate(600,430)">
    <rect x="-350" y="-24" width="120" height="48" rx="8" fill="#0c0c18" stroke="#60c0f0" stroke-width="1.2"/>
    <text x="-290" y="6" text-anchor="middle" fill="#60c0f0" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="18" font-weight="700">⚖️ Hermes</text>

    <rect x="-210" y="-24" width="120" height="48" rx="8" fill="#0c0c18" stroke="#f0a060" stroke-width="1.2"/>
    <text x="-150" y="6" text-anchor="middle" fill="#f0a060" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="15" font-weight="700">📐 Claude</text>

    <rect x="-70" y="-24" width="120" height="48" rx="8" fill="#0c0c18" stroke="#60f0a0" stroke-width="1.2"/>
    <text x="-10" y="6" text-anchor="middle" fill="#60f0a0" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="15" font-weight="700">🔬 CodeWhale</text>

    <rect x="70" y="-24" width="120" height="48" rx="8" fill="#0c0c18" stroke="#c060f0" stroke-width="1.2"/>
    <text x="130" y="6" text-anchor="middle" fill="#c060f0" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="15" font-weight="700">🧠 Reasonix</text>

    <rect x="230" y="-24" width="120" height="48" rx="8" fill="#0c0c18" stroke="#f06090" stroke-width="1.2"/>
    <text x="290" y="6" text-anchor="middle" fill="#f06090" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="15" font-weight="700">🔄 omp</text>
  </g>

  <!-- Footer bar -->
  <rect x="0" y="560" width="1200" height="70" fill="#08080f" opacity="0.8"/>
  <text x="600" y="595" text-anchor="middle" fill="#404058" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="12" letter-spacing="4">DeepSeek v4-pro · reasoning=max · flash forbidden · 2026 · hermes-core-rules-mac</text>
</svg>
