<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" style="background:#08080f">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#08080f"/>
      <stop offset="50%" stop-color="#0c0c18"/>
      <stop offset="100%" stop-color="#08080f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#f0c060" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#f0c060" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#08080f" stop-opacity="0"/>
    </radialGradient>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <linearGradient id="qGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0c060"/>
      <stop offset="30%" stop-color="#f0a840"/>
      <stop offset="60%" stop-color="#e0b870"/>
      <stop offset="100%" stop-color="#f0c060"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bgGrad)"/>
  <rect width="1200" height="600" fill="url(#glow)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.03">
    <line x1="0" y1="150" x2="1200" y2="150" stroke="#f0c060" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#f0c060" stroke-width="0.5"/>
    <line x1="0" y1="450" x2="1200" y2="450" stroke="#f0c060" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="600" stroke="#f0c060" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="600" stroke="#f0c060" stroke-width="0.5"/>
    <line x1="900" y1="0" x2="900" y2="600" stroke="#f0c060" stroke-width="0.5"/>
  </g>

  <!-- Floating particles -->
  <circle cx="100" cy="80" r="1.5" fill="#f0c060" opacity="0.4"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="4s" repeatCount="indefinite"/></circle>
  <circle cx="350" cy="200" r="1" fill="#f0c060" opacity="0.3"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="5s" repeatCount="indefinite"/></circle>
  <circle cx="850" cy="150" r="1.5" fill="#f0c060" opacity="0.2"><animate attributeName="opacity" values="0.1;0.4;0.1" dur="3s" repeatCount="indefinite"/></circle>
  <circle cx="1050" cy="400" r="1" fill="#f0c060" opacity="0.3"><animate attributeName="opacity" values="0.2;0.5;0.2" dur="6s" repeatCount="indefinite"/></circle>
  <circle cx="200" cy="450" r="1.5" fill="#f0c060" opacity="0.2"><animate attributeName="opacity" values="0.1;0.3;0.1" dur="4.5s" repeatCount="indefinite"/></circle>

  <!-- Horizontals left -->
  <line x1="80" y1="180" x2="300" y2="180" stroke="#f0c060" stroke-width="0.5" opacity="0.15"/>
  <line x1="900" y1="180" x2="1120" y2="180" stroke="#f0c060" stroke-width="0.5" opacity="0.15"/>
  <line x1="80" y1="420" x2="250" y2="420" stroke="#f0c060" stroke-width="0.5" opacity="0.15"/>
  <line x1="950" y1="420" x2="1120" y2="420" stroke="#f0c060" stroke-width="0.5" opacity="0.15"/>

  <!-- QUINTE Title -->
  <text x="600" y="230" text-anchor="middle" fill="url(#qGrad)" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="160" font-weight="900" letter-spacing="12" filter="url(#textGlow)">QUINTE</text>

  <!-- Underline -->
  <line x1="350" y1="260" x2="850" y2="260" stroke="#f0c060" stroke-width="1" opacity="0.4"/>
  <line x1="420" y1="263" x2="780" y2="263" stroke="#f0c060" stroke-width="1" opacity="0.2"/>

  <!-- Subtitle -->
  <text x="600" y="310" text-anchor="middle" fill="#707088" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="22" letter-spacing="8" opacity="0.8">MULTI-AGENT DEBATE ARCHITECTURE</text>

  <!-- Tagline -->
  <text x="600" y="350" text-anchor="middle" fill="#505068" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="16" letter-spacing="2" opacity="0.7">Five independent AI agents · Structured rounds · Adversarial cross-review · Final verdict</text>

  <!-- Agent badges -->
  <g transform="translate(600, 450)">
    <!-- Badge row -->
    <rect x="-340" y="-22" width="120" height="44" rx="8" fill="#0c0c18" stroke="#60c0f0" stroke-width="1" opacity="0.9"/>
    <text x="-280" y="6" text-anchor="middle" fill="#60c0f0" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="16" font-weight="700">⚖️ Hermes</text>

    <rect x="-200" y="-22" width="120" height="44" rx="8" fill="#0c0c18" stroke="#f0a060" stroke-width="1" opacity="0.9"/>
    <text x="-140" y="6" text-anchor="middle" fill="#f0a060" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="15" font-weight="700">📐 Claude</text>

    <rect x="-60" y="-22" width="120" height="44" rx="8" fill="#0c0c18" stroke="#60f0a0" stroke-width="1" opacity="0.9"/>
    <text x="0" y="6" text-anchor="middle" fill="#60f0a0" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="15" font-weight="700">🔬 CodeWhale</text>

    <rect x="80" y="-22" width="120" height="44" rx="8" fill="#0c0c18" stroke="#c060f0" stroke-width="1" opacity="0.9"/>
    <text x="140" y="6" text-anchor="middle" fill="#c060f0" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="15" font-weight="700">🧠 Reasonix</text>

    <rect x="220" y="-22" width="120" height="44" rx="8" fill="#0c0c18" stroke="#f06090" stroke-width="1" opacity="0.9"/>
    <text x="280" y="6" text-anchor="middle" fill="#f06090" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="15" font-weight="700">🔄 omp</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="530" width="1200" height="70" fill="#0a0a14" opacity="0.6"/>
  <text x="600" y="560" text-anchor="middle" fill="#404058" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="13" letter-spacing="3">DeepSeek v4-pro · reasoning=max · flash forbidden · 2026</text>
</svg>
