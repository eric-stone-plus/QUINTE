<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" style="background:#0a0a0f">
  <defs>
    <linearGradient id="gH" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#60c0f0"/><stop offset="1" stop-color="#4080c0"/></linearGradient>
    <linearGradient id="gC" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f0a060"/><stop offset="1" stop-color="#c07030"/></linearGradient>
    <linearGradient id="gW" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#60f0a0"/><stop offset="1" stop-color="#30c070"/></linearGradient>
    <linearGradient id="gR" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#c060f0"/><stop offset="1" stop-color="#8030c0"/></linearGradient>
    <linearGradient id="gO" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f06090"/><stop offset="1" stop-color="#c03060"/></linearGradient>
    <linearGradient id="gGold" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f0c060"/><stop offset="1" stop-color="#c09030"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#f0c060"/></marker>
  </defs>

  <!-- Title -->
  <text x="500" y="45" text-anchor="middle" fill="#f0c060" font-family="monospace" font-size="28" font-weight="bold">QUINTE</text>
  <text x="500" y="70" text-anchor="middle" fill="#606080" font-family="monospace" font-size="13">Multi-Agent Debate Architecture</text>

  <!-- R1 Box -->
  <rect x="50" y="100" width="900" height="180" rx="10" fill="#12121a" stroke="#1e1e30" stroke-width="1"/>
  <text x="500" y="125" text-anchor="middle" fill="#606080" font-family="monospace" font-size="11">ROUND 1 — Independent Analysis</text>

  <!-- R1 Agents -->
  <rect x="120" y="145" width="200" height="100" rx="8" fill="#0a0a0f" stroke="#60c0f0" stroke-width="1.5" filter="url(#glow)"/>
  <text x="220" y="180" text-anchor="middle" fill="#60c0f0" font-family="monospace" font-size="18" font-weight="bold">⚖️ Hermes</text>
  <text x="220" y="205" text-anchor="middle" fill="#606080" font-family="monospace" font-size="11">Orchestrator</text>
  <text x="220" y="225" text-anchor="middle" fill="#4080c0" font-family="monospace" font-size="10">DS v4-pro · max</text>

  <rect x="390" y="145" width="200" height="100" rx="8" fill="#0a0a0f" stroke="#f0a060" stroke-width="1.5"/>
  <text x="490" y="180" text-anchor="middle" fill="#f0a060" font-family="monospace" font-size="18" font-weight="bold">📐 Claude Code</text>
  <text x="490" y="205" text-anchor="middle" fill="#606080" font-family="monospace" font-size="11">Broad Coverage</text>
  <text x="490" y="225" text-anchor="middle" fill="#c07030" font-family="monospace" font-size="10">DS v4-pro · max</text>

  <rect x="660" y="145" width="200" height="100" rx="8" fill="#0a0a0f" stroke="#60f0a0" stroke-width="1.5"/>
  <text x="760" y="180" text-anchor="middle" fill="#60f0a0" font-family="monospace" font-size="18" font-weight="bold">🔬 CodeWhale</text>
  <text x="760" y="205" text-anchor="middle" fill="#606080" font-family="monospace" font-size="11">Deep Research</text>
  <text x="760" y="225" text-anchor="middle" fill="#30c070" font-family="monospace" font-size="10">DS v4-pro · max</text>

  <!-- cc timeout → OMP -->
  <text x="590" y="270" text-anchor="middle" fill="#606080" font-family="monospace" font-size="9">cc timeout 180s? → OMP fills R1</text>

  <!-- Arrow R1→R2 -->
  <line x1="500" y1="285" x2="500" y2="330" stroke="#f0c060" stroke-width="1.5" marker-end="url(#arrowGold)" stroke-dasharray="4,4"/>

  <!-- R2 Box -->
  <rect x="50" y="340" width="900" height="180" rx="10" fill="#12121a" stroke="#1e1e30" stroke-width="1"/>
  <text x="500" y="365" text-anchor="middle" fill="#606080" font-family="monospace" font-size="11">ROUND 2 — Cross-Review ◂ Review Others, Never Self</text>

  <!-- R2 Agents (5 columns) -->
  <rect x="55" y="385" width="160" height="110" rx="8" fill="#0a0a0f" stroke="#60c0f0" stroke-width="1"/>
  <text x="135" y="420" text-anchor="middle" fill="#60c0f0" font-family="monospace" font-size="14" font-weight="bold">⚖️ Hermes</text>
  <text x="135" y="445" text-anchor="middle" fill="#606080" font-family="monospace" font-size="9">Reviews:</text>
  <text x="135" y="465" text-anchor="middle" fill="#4080c0" font-family="monospace" font-size="8">cc + cw + rx + omp</text>

  <rect x="235" y="385" width="160" height="110" rx="8" fill="#0a0a0f" stroke="#f0a060" stroke-width="1"/>
  <text x="315" y="420" text-anchor="middle" fill="#f0a060" font-family="monospace" font-size="14" font-weight="bold">📐 Claude Code</text>
  <text x="315" y="445" text-anchor="middle" fill="#606080" font-family="monospace" font-size="9">Reviews:</text>
  <text x="315" y="465" text-anchor="middle" fill="#c07030" font-family="monospace" font-size="8">h + cw + rx + omp</text>

  <rect x="415" y="385" width="160" height="110" rx="8" fill="#0a0a0f" stroke="#60f0a0" stroke-width="1"/>
  <text x="495" y="420" text-anchor="middle" fill="#60f0a0" font-family="monospace" font-size="14" font-weight="bold">🔬 CodeWhale</text>
  <text x="495" y="445" text-anchor="middle" fill="#606080" font-family="monospace" font-size="9">Reviews:</text>
  <text x="495" y="465" text-anchor="middle" fill="#30c070" font-family="monospace" font-size="8">h + cc + rx + omp</text>

  <rect x="595" y="385" width="160" height="110" rx="8" fill="#0a0a0f" stroke="#c060f0" stroke-width="1"/>
  <text x="675" y="420" text-anchor="middle" fill="#c060f0" font-family="monospace" font-size="14" font-weight="bold">🧠 Reasonix</text>
  <text x="675" y="445" text-anchor="middle" fill="#606080" font-family="monospace" font-size="9">R2 Only · Pure Reasoning</text>
  <text x="675" y="465" text-anchor="middle" fill="#8030c0" font-family="monospace" font-size="8">Content embedded in prompt</text>

  <rect x="775" y="385" width="160" height="110" rx="8" fill="#0a0a0f" stroke="#f06090" stroke-width="1"/>
  <text x="855" y="420" text-anchor="middle" fill="#f06090" font-family="monospace" font-size="14" font-weight="bold">🔄 omp</text>
  <text x="855" y="445" text-anchor="middle" fill="#606080" font-family="monospace" font-size="9">Hot Spare · Reviewer</text>
  <text x="855" y="465" text-anchor="middle" fill="#c03060" font-family="monospace" font-size="8">DS v4-pro · xhigh</text>

  <!-- Arrow R2→R3 -->
  <line x1="500" y1="525" x2="500" y2="570" stroke="#f0c060" stroke-width="1.5" marker-end="url(#arrowGold)" stroke-dasharray="4,4"/>

  <!-- R3 Box -->
  <rect x="250" y="580" width="500" height="100" rx="10" fill="#12121a" stroke="#f0c060" stroke-width="2" filter="url(#glow)"/>
  <text x="500" y="610" text-anchor="middle" fill="#f0c060" font-family="monospace" font-size="13">ROUND 3 — Final Verdict</text>
  <text x="500" y="640" text-anchor="middle" fill="#f0c060" font-family="monospace" font-size="18" font-weight="bold">⚖️ Hermes Synthesizes All Findings</text>
  <text x="500" y="662" text-anchor="middle" fill="#c09030" font-family="monospace" font-size="10">Consensus · Disagreements · Risk Matrix · Final Ruling</text>

  <!-- Footer -->
  <text x="500" y="760" text-anchor="middle" fill="#404050" font-family="monospace" font-size="10">All agents: DeepSeek v4-pro · reasoning=max · flash forbidden · terminal+background CLI · 2026-06-02</text>

  <!-- Stats bar -->
  <rect x="100" y="710" width="160" height="35" rx="5" fill="#12121a" stroke="#1e1e30"/>
  <text x="180" y="733" text-anchor="middle" fill="#f0c060" font-family="monospace" font-size="16" font-weight="bold">5 Agents</text>
  <rect x="290" y="710" width="160" height="35" rx="5" fill="#12121a" stroke="#1e1e30"/>
  <text x="370" y="733" text-anchor="middle" fill="#f0c060" font-family="monospace" font-size="16" font-weight="bold">3 Rounds</text>
  <rect x="480" y="710" width="160" height="35" rx="5" fill="#12121a" stroke="#1e1e30"/>
  <text x="560" y="733" text-anchor="middle" fill="#f0c060" font-family="monospace" font-size="16" font-weight="bold">10+ Debates</text>
  <rect x="670" y="710" width="160" height="35" rx="5" fill="#12121a" stroke="#1e1e30"/>
  <text x="750" y="733" text-anchor="middle" fill="#f0c060" font-family="monospace" font-size="16" font-weight="bold">0 Flash</text>
</svg>
