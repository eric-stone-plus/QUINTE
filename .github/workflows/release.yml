name: Release binaries

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  validate:
    name: Validate release metadata
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - name: Match tag and package versions
        shell: bash
        run: |
          version="$(cargo metadata --locked --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "quinte") | .version')"
          test -n "$version"
          if [[ "$GITHUB_REF" == refs/tags/v* && "$GITHUB_REF_NAME" != "v$version" ]]; then
            echo "tag $GITHUB_REF_NAME does not match package version $version" >&2
            exit 1
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: validate
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive: quinte-x86_64-apple-darwin.tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            archive: quinte-aarch64-apple-darwin.tar.gz
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive: quinte-x86_64-unknown-linux-gnu.tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: quinte-aarch64-unknown-linux-gnu.tar.gz
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            archive: quinte-x86_64-pc-windows-msvc.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - name: Set up Node for Windows integration tests
        if: runner.os == 'Windows'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
      - name: Set up Bun for Windows integration tests
        if: runner.os == 'Windows'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - name: Test native target
        timeout-minutes: 20
        run: cargo test --locked --all-features --target ${{ matrix.target }}
      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}
      - name: Verify Unix binary version
        if: runner.os != 'Windows'
        shell: bash
        run: |
          version="$(cargo metadata --locked --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "quinte") | .version')"
          reported="$(target/${{ matrix.target }}/release/quinte --version)"
          [[ "$reported" == "quinte $version" ]]
      - name: Verify Windows binary version
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $Version = (cargo metadata --locked --no-deps --format-version 1 | ConvertFrom-Json).packages |
            Where-Object name -eq 'quinte' |
            Select-Object -ExpandProperty version
          $Reported = & target/${{ matrix.target }}/release/quinte.exe --version
          if ($LASTEXITCODE -ne 0 -or $Reported -ne "quinte $Version") {
            throw "binary version '$Reported' does not match package version '$Version'"
          }
      - name: Package Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: tar -C target/${{ matrix.target }}/release -czf ${{ matrix.archive }} quinte
      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path target/${{ matrix.target }}/release/quinte.exe -DestinationPath ${{ matrix.archive }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.target }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Create checksums
        working-directory: dist
        run: sha256sum quinte-* > SHA256SUMS
      - name: Publish immutable assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --repo "${GITHUB_REPOSITORY}" --verify-tag --generate-notes
