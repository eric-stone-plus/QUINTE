name: Release binaries
run-name: Release v${{ inputs.version }} from ${{ github.sha }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: Stable Cargo version to release (for example 0.1.5)
        required: true
        type: string

concurrency:
  group: quinte-release
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

env:
  RELEASE_VERSION: ${{ inputs.version }}
  RELEASE_CANDIDATE: ${{ github.sha }}

jobs:
  validate:
    name: Bind immutable release candidate
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - name: Reject reused identity or candidate
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/release-guard.sh "$RELEASE_VERSION" "$RELEASE_CANDIDATE"

  build:
    name: Build ${{ matrix.target }}
    needs: validate
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive: quinte-x86_64-apple-darwin.tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            archive: quinte-aarch64-apple-darwin.tar.gz
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive: quinte-x86_64-unknown-linux-gnu.tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: quinte-aarch64-unknown-linux-gnu.tar.gz
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            archive: quinte-x86_64-pc-windows-msvc.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ env.RELEASE_CANDIDATE }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - name: Set up Node for Windows integration tests
        if: runner.os == 'Windows'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
      - name: Set up Bun for Windows integration tests
        if: runner.os == 'Windows'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - name: Test native target
        run: cargo test --locked --all-features --target "${{ matrix.target }}"
      - name: Build release binary
        run: cargo build --locked --release --target "${{ matrix.target }}"
      - name: Verify Unix binary identity
        if: runner.os != 'Windows'
        run: |
          test "$(git rev-parse HEAD)" = "$RELEASE_CANDIDATE"
          test "$(target/${{ matrix.target }}/release/quinte --version)" = "quinte $RELEASE_VERSION"
      - name: Verify Windows binary identity
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if ((git rev-parse HEAD) -ne "$env:RELEASE_CANDIDATE") {
            throw "checkout is not the bound release candidate"
          }
          $Reported = & target/${{ matrix.target }}/release/quinte.exe --version
          if ($LASTEXITCODE -ne 0 -or $Reported -ne "quinte $env:RELEASE_VERSION") {
            throw "binary identity '$Reported' does not match the release request"
          }
      - name: Package Unix binary
        if: runner.os != 'Windows'
        run: tar -C "target/${{ matrix.target }}/release" -czf "${{ matrix.archive }}" quinte
      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path target/${{ matrix.target }}/release/quinte.exe -DestinationPath ${{ matrix.archive }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.target }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  publish:
    name: Create immutable tag and release
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      actions: read
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_CANDIDATE }}
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Recheck candidate and exact asset set
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          scripts/release-guard.sh "$RELEASE_VERSION" "$RELEASE_CANDIDATE"
          scripts/release-guard.sh --assets dist
      - name: Create annotated tag through non-updating REST endpoints
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v$RELEASE_VERSION"
          tag_object="$(jq -nc \
            --arg tag "$tag" \
            --arg message "Release $tag" \
            --arg object "$RELEASE_CANDIDATE" \
            --arg name "github-actions[bot]" \
            --arg email "41898282+github-actions[bot]@users.noreply.github.com" \
            '{tag:$tag,message:$message,object:$object,type:"commit",tagger:{name:$name,email:$email}}')"
          tag_sha="$(gh api --method POST "repos/$GITHUB_REPOSITORY/git/tags" \
            --input - --jq '.sha' <<<"$tag_object")"
          [[ "$tag_sha" =~ ^[0-9a-f]{40}$ ]]
          ref_object="$(jq -nc --arg ref "refs/tags/$tag" --arg sha "$tag_sha" '{ref:$ref,sha:$sha}')"
          gh api --method POST "repos/$GITHUB_REPOSITORY/git/refs" --input - <<<"$ref_object" >/dev/null
      - name: Verify remote tag and publish exact checksummed assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v$RELEASE_VERSION"
          git fetch --no-tags origin "refs/tags/$tag:refs/tags/$tag"
          test "$(git cat-file -t "$tag")" = tag
          test "$(git rev-parse "$tag^{commit}")" = "$RELEASE_CANDIDATE"
          cd dist
          LC_ALL=C sha256sum \
            quinte-aarch64-apple-darwin.tar.gz \
            quinte-aarch64-unknown-linux-gnu.tar.gz \
            quinte-x86_64-apple-darwin.tar.gz \
            quinte-x86_64-pc-windows-msvc.zip \
            quinte-x86_64-unknown-linux-gnu.tar.gz > SHA256SUMS
          cd ..
          scripts/release-guard.sh --assets dist --checksums
          gh release create "$tag" \
            dist/quinte-aarch64-apple-darwin.tar.gz \
            dist/quinte-aarch64-unknown-linux-gnu.tar.gz \
            dist/quinte-x86_64-apple-darwin.tar.gz \
            dist/quinte-x86_64-pc-windows-msvc.zip \
            dist/quinte-x86_64-unknown-linux-gnu.tar.gz \
            dist/SHA256SUMS \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --target "$RELEASE_CANDIDATE" \
            --generate-notes
